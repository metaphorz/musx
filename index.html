<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusX — Node Patcher</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%231b1d22'/><circle cx='8' cy='8' r='4' fill='%234ea1ff'/></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Tone.js (vendored locally, UMD -> exposes global `Tone`) -->
  <script src="lib/tone.min.js"></script>
</head>
<body>
  <header id="toolbar">
    <span class="brand">MusX<small class="brand-credit">Paul Fishwick &amp; Claude Code</small></span>

    <div class="group">
      <button id="palette-btn">+ Add object ▾</button>
    </div>

    <div class="group">
      <button id="btn-audio" class="primary">▶ Start Audio</button>
      <button id="btn-play" disabled>⏵ Play</button>
      <button id="btn-stop" disabled>⏹ Stop</button>
    </div>

    <div class="group">
      <label for="bpm">BPM</label>
      <input id="bpm" type="number" min="20" max="300" value="120" />
    </div>

    <div class="group">
      <label for="master">Master</label>
      <input id="master" type="range" min="0" max="1" step="0.01" value="0.8" />
    </div>

    <div class="group right">
      <button id="btn-encap" title="Collapse selected objects into a patcher (⌘/Ctrl+E)">Encapsulate</button>
      <button id="btn-insert-abs" title="Insert a patcher that references a saved .json abstraction file">Insert abstraction</button>
      <button id="btn-save-abs" title="Download the current subpatch as a reusable abstraction .json (enter a patcher first)">Save as abstraction</button>
      <button id="btn-reload" title="Re-fetch every referenced abstraction file and update all instances">Reload abstractions</button>
      <button id="btn-save">Save</button>
      <button id="btn-load">Load</button>
      <button id="btn-demo">Demo</button>
      <button id="btn-clear">Clear</button>
      <input id="file-input" type="file" accept="application/json" hidden />
    </div>
  </header>

  <main id="canvas">
    <!-- SVG layer holds the cables; node boxes are absolutely-positioned divs on top -->
    <svg id="cables" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="nodes"></div>
    <!-- Launch hint: the default patch loaded on startup and how to reload it -->
    <div id="launch-note">
      <button id="launch-note-close" title="Hide">×</button>
      <span>Default patch: <b>Cathedral Pad</b> — reload anytime via <b>Demo → 11 Cathedral Pad</b></span>
    </div>
    <!-- Optional per-patch credit (composer/source); shown only when the loaded patch carries one -->
    <div id="patch-credits" hidden>
      <button id="patch-credits-close" title="Hide">×</button>
      <span id="patch-credits-text"></span>
      <a id="patch-credits-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Source ↗</a>
    </div>
  </main>

  <div id="status">
    <span id="status-msg">Click <b>Start Audio</b> to enable sound, then add objects from the palette.</span>
    <span class="credit">crafted by Paul Fishwick &amp; Claude Code</span>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
